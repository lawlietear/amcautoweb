<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>验证 - 山东金融资产智能文书系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* Art Deco 登录页样式 */
        .login-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--deco-cream);
            padding: 20px;
            position: relative;
        }
        
        /* 背景装饰 */
        .login-page::before {
            content: '';
            position: fixed;
            top: -50%;
            left: 50%;
            transform: translateX(-50%);
            width: 200%;
            height: 150%;
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                rgba(201, 169, 110, 0.05) 5deg,
                transparent 10deg,
                transparent 20deg,
                rgba(201, 169, 110, 0.05) 25deg,
                transparent 30deg,
                transparent 40deg,
                rgba(201, 169, 110, 0.05) 45deg,
                transparent 50deg,
                transparent 60deg,
                rgba(201, 169, 110, 0.05) 65deg,
                transparent 70deg,
                transparent 80deg,
                rgba(201, 169, 110, 0.05) 85deg,
                transparent 90deg
            );
            animation: sunburst-rotate 60s linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes sunburst-rotate {
            from { transform: translateX(-50%) rotate(0deg); }
            to { transform: translateX(-50%) rotate(360deg); }
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid var(--deco-gold);
            padding: 48px 40px;
            text-align: center;
            position: relative;
            z-index: 1;
            box-shadow: 0 20px 60px rgba(201, 169, 110, 0.2);
        }
        
        /* Art Deco 装饰角 */
        .login-container::before {
            content: '';
            position: absolute;
            top: 12px;
            left: 12px;
            width: 30px;
            height: 30px;
            border-top: 3px solid var(--deco-gold);
            border-left: 3px solid var(--deco-gold);
        }
        
        .login-container::after {
            content: '';
            position: absolute;
            bottom: 12px;
            right: 12px;
            width: 30px;
            height: 30px;
            border-bottom: 3px solid var(--deco-gold);
            border-right: 3px solid var(--deco-gold);
        }
        
        /* 装饰菱形 */
        .login-container .deco-diamond {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 10px;
            height: 10px;
            background: var(--deco-gold);
            transform: rotate(45deg);
        }
        
        .login-container .deco-diamond-bottom {
            position: absolute;
            bottom: 12px;
            left: 12px;
            width: 10px;
            height: 10px;
            background: var(--deco-gold);
            transform: rotate(45deg);
        }
        
        .login-icon {
            width: 80px;
            height: 80px;
            background: var(--deco-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            font-size: 40px;
            border: 2px solid var(--deco-gold-dark);
        }
        
        .login-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--deco-black);
            margin-bottom: 8px;
            letter-spacing: 3px;
        }
        
        .login-subtitle {
            font-size: 15px;
            color: var(--deco-gold-dark);
            margin-bottom: 32px;
            letter-spacing: 1px;
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .password-input {
            padding: 16px 20px;
            border: 1px solid var(--deco-gold);
            font-size: 16px;
            text-align: center;
            letter-spacing: 4px;
            transition: all 0.2s;
            background: white;
            color: var(--deco-black);
            font-family: inherit;
        }
        
        .password-input:focus {
            outline: none;
            border-color: var(--deco-gold-dark);
            box-shadow: 0 0 0 3px rgba(201, 169, 110, 0.15);
        }
        
        .password-input.error {
            border-color: #FF3B30;
            background: rgba(255, 59, 48, 0.05);
        }
        
        .login-btn {
            padding: 16px 24px;
            background: var(--deco-gold);
            color: white;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }
        
        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.3),
                transparent
            );
            transition: left 0.5s ease;
        }
        
        .login-btn:hover::before {
            left: 100%;
        }
        
        .login-btn:hover {
            background: var(--deco-gold-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(201, 169, 110, 0.3);
        }
        
        .error-message {
            color: #FF3B30;
            font-size: 14px;
            font-weight: 500;
            padding: 12px;
            background: rgba(255, 59, 48, 0.08);
            border: 1px solid rgba(255, 59, 48, 0.3);
            margin-bottom: 16px;
        }
        
        .back-link {
            margin-top: 28px;
            color: var(--deco-gold-dark);
            font-size: 14px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
            letter-spacing: 1px;
        }
        
        .back-link:hover {
            color: var(--deco-gold);
        }
        
        .hint {
            margin-top: 24px;
            padding: 16px;
            background: rgba(245, 240, 232, 0.8);
            border: 1px dashed var(--deco-gold);
            font-size: 13px;
            color: var(--deco-gold-dark);
            letter-spacing: 1px;
        }
        
        .hint strong {
            color: var(--deco-black);
        }
        
        /* 装饰分隔线 */
        .login-divider {
            width: 40%;
            height: 2px;
            margin: 24px auto;
            background: linear-gradient(
                90deg,
                transparent 0%,
                var(--deco-gold) 50%,
                transparent 100%
            );
        }
    </style>
</head>
<body class="login-page">
    <div class="login-container">
        <!-- 装饰菱形 -->
        <div class="deco-diamond"></div>
        <div class="deco-diamond-bottom"></div>
        
        <div class="login-icon">🔒</div>
        <h1 class="login-title">审计日志</h1>
        <p class="login-subtitle">此页面需要密码访问</p>
        
        <div class="login-divider"></div>
        
        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}
        
        <form class="login-form" method="POST">
            <input 
                type="password" 
                name="password" 
                class="password-input {% if error %}error{% endif %}" 
                placeholder="请输入密码"
                autofocus
                autocomplete="off"
            >
            <button type="submit" class="login-btn">进入查看</button>
        </form>
        
        <a href="/" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
            返回首页
        </a>
        
        <div class="hint">
            请联系管理员获取访问密码
        </div>
    </div>
    
    <script>
        document.querySelector('.password-input').focus();
    </script>
</body>
</html>
